<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - NeuroGen Atlas</title>

    <link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div id="stars"></div>

<div class="auth-page">

    <div class="auth-glow"></div>

    <div class="auth-card">

        <h1 class="auth-logo">
            NEUROGEN ATLAS
        </h1>

        <p class="auth-subtitle">
            Mapeando o futuro da humanidade.
        </p>

        <form
            id="login-form"
            class="auth-form"
        >

            <input
                class="auth-input"
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <input
                class="auth-input"
                type="password"
                id="password"
                placeholder="Senha"
                required
            >

            <button
                class="auth-btn"
                type="submit"
            >
                Entrar
            </button>

        </form>

        <div class="auth-divider"></div>

        <div class="auth-footer">

            Não possui conta?

            <a href="/register">
                Criar conta
            </a>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/login.js') }}"></script>

</body>

</html>
